name: Copilot PR Review Agent

on:
  pull_request_review_comment:
    types:
      - created

permissions:
  contents: read
  pull-requests: write

jobs:
  handoff-to-claude-and-codex:
    if: github.event.comment.user.login == 'copilot-pull-request-reviewer[bot]' || github.event.comment.user.login == 'github-copilot[bot]' || github.event.comment.user.login == 'copilot'
    runs-on: ubuntu-latest
    steps:
      - name: Create handoff comment
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const comment = context.payload.comment;
            const body = [
              '@claude @codex Copilot added a PR review comment that needs follow-up.',
              '',
              `- PR: #${pr.number}`,
              `- File: ${comment.path ?? 'n/a'}`,
              `- Line: ${comment.line ?? comment.original_line ?? 'n/a'}`,
              `- Copilot comment: ${comment.html_url}`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body,
            });
